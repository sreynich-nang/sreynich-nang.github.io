<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Navbar Loading</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f8fafc;
        padding-top: 80px; /* Offset for the fixed-top navbar */
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      #footer-placeholder {
        margin-top: auto; /* Push footer to the bottom of the viewport */
      }
    </style>
  </head>

  <body>
    <!-- Placeholder for navbar component -->
    <div id="navbar-placeholder"></div>

    <!-- Placeholder for footer component -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript to load components -->
    <script>
      // Load Navbar
      fetch('pages/components/nav.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.statusText);
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
        })
        .catch(error => {
          console.error('Error loading the navbar:', error);
          document.getElementById('navbar-placeholder').innerHTML = `
            <div class="alert alert-danger m-3" role="alert">
              Failed to load navbar component: ${error.message}
            </div>
          `;
        });

      // Load Footer
      fetch('pages/components/footer.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.statusText);
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        })
        .catch(error => {
          console.error('Error loading the footer:', error);
          document.getElementById('footer-placeholder').innerHTML = `
            <div class="alert alert-danger m-3" role="alert">
              Failed to load footer component: ${error.message}
            </div>
          `;
        });
    </script>
  </body>
</html>
