<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

</head>
<body>

<div class="container">

    <h2 class="section-title">
        My Projects
    </h2>

    <div class="swiper mySwiper">

        <div class="swiper-wrapper">

            <!-- Card 1 -->
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://picsum.photos/500/300?1">
                    <div class="card-body">
                        <h5 class="card-title">Project One</h5>
                        <p>
                            Description of your project goes here.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://picsum.photos/500/300?2">
                    <div class="card-body">
                        <h5 class="card-title">Project Two</h5>
                        <p>
                            Description of your project goes here.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://picsum.photos/500/300?3">
                    <div class="card-body">
                        <h5 class="card-title">Project Three</h5>
                        <p>
                            Description of your project goes here.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://picsum.photos/500/300?4">
                    <div class="card-body">
                        <h5 class="card-title">Project Four</h5>
                        <p>
                            Description of your project goes here.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Card 5 -->
            <div class="swiper-slide">
                <div class="card">
                    <img src="https://picsum.photos/500/300?5">
                    <div class="card-body">
                        <h5 class="card-title">Project Five</h5>
                        <p>
                            Description of your project goes here.
                        </p>
                    </div>
                </div>
            </div>

        </div>

        <div class="swiper-pagination position-relative mt-4"></div>

    </div>

</div>


<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

const swiper = new Swiper(".mySwiper",{

    slidesPerView:1,
    spaceBetween:25,

    loop:true,

    autoplay:{
        delay:2500,
        disableOnInteraction:false,
    },

    speed:1000,

    pagination:{
        el:".swiper-pagination",
        clickable:true,
    },

    breakpoints:{
        768:{
            slidesPerView:2,
        },

        992:{
            slidesPerView:3,
        }

    }

});

</script>

</body>
</html>
