<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Notes</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

    <!-- Placeholder for navbar component -->
    <div id="navbar-placeholder"></div>

    <!-- Notes Hero Cover -->
    <header id="notes-cover" class="sec-notes-cover">
      <div class="sec-notes-cover-bg"></div>
      <div class="sec-notes-cover-overlay"></div>
      <div class="sec-notes-cover-content">
        <h1 class="text-white">My Random Notes</h1>
        <p class="lead">Which I have believe of what I been believing</p>
      </div>
    </header>

    <main class="container py-5 my-3">
      <div id="random-notes-placeholder"></div>
    </main>

    <!-- Placeholder for footer component -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript to load components -->
    <script>
      // Load Navbar
      fetch('components/nav.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.statusText);
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
          
          // Adjust navbar links for subpage directory depth
          document.querySelectorAll('#navbar-placeholder .navbar-brand, #navbar-placeholder .nav-link, #navbar-placeholder .btn-contact').forEach(link => {
            let href = link.getAttribute('href');
            if (href) {
              if (href.startsWith('#')) {
                // Point to index.html with section ID (e.g. ../index.html#about)
                link.setAttribute('href', '../index.html' + href);
              } else if (href.startsWith('pages/')) {
                // Strip 'pages/' prefix since random-notes.html is already inside 'pages/'
                link.setAttribute('href', href.replace('pages/', ''));
              } else if (href === 'index.html') {
                // Point home logo to the root index.html
                link.setAttribute('href', '../index.html');
              }
            }
          });
        })
        .catch(error => {
          console.error('Error loading the navbar:', error);
          document.getElementById('navbar-placeholder').innerHTML = `
            <div class="alert alert-danger m-3" role="alert">
              Failed to load navbar component: ${error.message}
            </div>
          `;
        });

      // Load Footer
      fetch('components/footer.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.statusText);
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        })
        .catch(error => {
          console.error('Error loading the footer:', error);
          document.getElementById('footer-placeholder').innerHTML = `
            <div class="alert alert-danger m-3" role="alert">
              Failed to load footer component: ${error.message}
            </div>
          `;
        });

      // Load Random Notes Component
      fetch('components/randomNote.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.statusText);
          }
          return response.text();
        })
        .then(data => {
          const placeholder = document.getElementById('random-notes-placeholder');
          if (placeholder) {
            placeholder.innerHTML = data;
            
            // Find and execute script tags within the injected HTML
            const scripts = placeholder.querySelectorAll('script');
            scripts.forEach(script => {
              const executionScript = document.createElement('script');
              executionScript.textContent = script.textContent;
              document.body.appendChild(executionScript).parentNode.removeChild(executionScript);
            });
          }
        })
        .catch(error => {
          console.error('Error loading random notes content:', error);
          document.getElementById('random-notes-placeholder').innerHTML = `
            <div class="alert alert-danger m-3" role="alert">
              Failed to load random notes component: ${error.message}
            </div>
          `;
        });
    </script>
</body>
</html>
