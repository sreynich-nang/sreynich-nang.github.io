<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Details - Coming Soon</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <style>
      body {
        padding-top: 80px;
      }
      .badge-upcoming {
        background-color: #eff6ff;
        color: #2563eb;
        border: 1px solid #bfdbfe;
        font-weight: 600;
        font-size: 0.85rem;
        padding: 6px 14px;
        border-radius: 20px;
      }
    </style>
</head>
<body>

    <!-- Placeholder for navbar component -->
    <div id="navbar-placeholder"></div>

    <main class="py-5 min-vh-100 d-flex align-items-center">
      <div class="container my-5">
        <div class="row g-5 align-items-center">
          <div class="col-lg-6">
            <span class="badge-upcoming d-inline-block mb-3"><i class="bi bi-clock-history me-1"></i> Coming Soon</span>
            <h1 class="fw-bold display-4 mb-3" style="color: #0f172a;">Detailed Note</h1>
            <p class="lead text-secondary mb-4">
              I am currently preparing a comprehensive post for this note. I will be sharing deeper insights, personal stories, and full breakdowns of the thoughts summarized here.
            </p>
            <div class="d-flex gap-3">
              <a href="../random-notes.html" class="btn btn-outline-soft">
                <i class="bi bi-arrow-left me-1"></i> Back to Random Notes
              </a>
            </div>
          </div>
          <div class="col-lg-6 text-center">
            <img src="../../assets/images/meme1.jpg" class="img-fluid rounded-4" alt="Writing Note">
          </div>
        </div>
      </div>
    </main>

    <!-- Placeholder for footer component -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript to load components -->
    <script>
      // Load Navbar
      fetch('../components/nav.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
          
          // Adjust navbar links for subpage directory depth (2 levels deep)
          document.querySelectorAll('#navbar-placeholder .navbar-brand, #navbar-placeholder .nav-link, #navbar-placeholder .btn-contact').forEach(link => {
            let href = link.getAttribute('href');
            if (href) {
              if (href.startsWith('#')) {
                link.setAttribute('href', '../../index.html' + href);
              } else if (href.startsWith('pages/')) {
                link.setAttribute('href', '../' + href.replace('pages/', ''));
              } else if (href === 'index.html') {
                link.setAttribute('href', '../../index.html');
              }
            }
          });
        });

      // Load Footer
      fetch('../components/footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        });
    </script>
</body>
</html>
