<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Sreynich Nang</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <style>
      body {
        padding-top: 80px;
      }
      .project-detail-hero {
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
      }
      .badge-upcoming {
        background-color: #eff6ff;
        color: #2563eb;
        border: 1px solid #bfdbfe;
        font-weight: 600;
        font-size: 0.85rem;
        padding: 6px 14px;
        border-radius: 20px;
      }
    </style>
</head>
<body>

    <!-- Placeholder for navbar component -->
    <div id="navbar-placeholder"></div>

    <main class="py-5">
      <div class="container my-5">
        <div class="row g-5 align-items-center">
          <div class="col-lg-6">
            <span class="badge-upcoming d-inline-block mb-3"><i class="bi bi-clock-history me-1"></i> Upcoming Case Study</span>
            <h1 id="project-title" class="fw-bold display-4 mb-3">Project Details</h1>
            <p id="project-desc" class="lead text-secondary mb-4">
              Detailed breakdown and case study of this project will be uploaded soon.
            </p>
            <div class="d-flex gap-3">
              <a href="../../index.html#projects" class="btn btn-outline-soft">
                <i class="bi bi-arrow-left me-1"></i> Back to Projects
              </a>
            </div>
          </div>
          <div class="col-lg-6 text-center">
            <div class="rounded-4 overflow-hidden shadow-lg border border-light-subtle">
              <img id="project-img" src="../../assets/images/meme1.jpg" class="img-fluid object-fit-cover w-100" style="max-height: 400px;" alt="Project Image">
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Placeholder for footer component -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript to load components and dynamic project detail -->
    <script>
      // Load Navbar
      fetch('../components/nav.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
          
          // Adjust navbar links for subpage directory depth (2 levels deep)
          document.querySelectorAll('#navbar-placeholder .navbar-brand, #navbar-placeholder .nav-link, #navbar-placeholder .btn-contact').forEach(link => {
            let href = link.getAttribute('href');
            if (href) {
              if (href.startsWith('#')) {
                link.setAttribute('href', '../../index.html' + href);
              } else if (href.startsWith('pages/')) {
                link.setAttribute('href', '../' + href.replace('pages/', ''));
              } else if (href === 'index.html') {
                link.setAttribute('href', '../../index.html');
              }
            }
          });
        });

      // Load Footer
      fetch('../components/footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        });

      // Parse query string and load project info
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = parseInt(urlParams.get('id'));
        
        if (projectId) {
          fetch('../components/titleProject.json')
            .then(response => response.json())
            .then(data => {
              const project = data.find(p => p.id === projectId);
              if (project) {
                document.getElementById('project-title').textContent = project.title;
                document.getElementById('project-desc').textContent = project.description + " Full implementation details, architectural choices, and technical writeups are currently being prepared for this showcase.";
                
                // Adjust image URL for subpage directory depth
                let imgUrl = project.imageUrl;
                if (imgUrl.startsWith('assets/')) {
                  imgUrl = '../../' + imgUrl;
                }
                document.getElementById('project-img').src = imgUrl;
                document.getElementById('project-img').alt = project.title;
                document.title = project.title + " - Project Details";
              }
            })
            .catch(error => {
              console.error('Error loading project details:', error);
            });
        }
      })();
    </script>
</body>
</html>
