<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f8fafc;
        padding-top: 80px; /* Offset for fixed navbar */
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      #footer-placeholder {
        margin-top: auto;
      }

      .info-wrap {
        border-top: 3px solid #65a6f0;
      }

      .info-item {
        margin-bottom: 30px;
      }

      .info-item i {
        font-size: 20px;
        color: #65a6f0;
        background: #eff6ff;
        width: 44px;
        height: 44px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
        margin-right: 15px;
        transition: all 0.3s ease-in-out;
      }

      .info-item:hover i {
        background: #65a6f0;
        color: #fff;
      }

      .info-item h3 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 5px;
        color: #0f172a;
      }

      .info-item p {
        padding: 0;
        margin: 0;
        font-size: 14px;
        color: #475569;
      }

      form.php-email-form {
        border-top: 3px solid #65a6f0;
      }

      form.php-email-form label {
        font-weight: 600;
        color: #334155;
      }

      form.php-email-form .form-control {
        border-radius: 8px;
        padding: 10px 15px;
        border-color: #cbd5e1;
      }

      form.php-email-form .form-control:focus {
        border-color: #65a6f0;
        box-shadow: 0 0 0 0.25rem rgba(101, 166, 240, 0.25);
      }

      form.php-email-form button[type="submit"] {
        background: #65a6f0;
        border: 0;
        padding: 12px 35px;
        color: #fff;
        transition: 0.4s;
        border-radius: 50px;
        font-weight: 600;
      }

      form.php-email-form button[type="submit"]:hover {
        background: #1f2937;
      }

      form.php-email-form .loading,
      form.php-email-form .error-message,
      form.php-email-form .sent-message {
        display: none;
      }
    </style>
</head>
<body>

    <!-- Placeholder for navbar component -->
    <div id="navbar-placeholder"></div>

    <section class="contact-section py-5">
      <div class="container">
        <h2 class="fw-bold display-6 text-center mb-5">Contact</h2>
        
        <div class="row g-4">
          <!-- Info Column -->
          <div class="col-lg-5">
            <div class="info-wrap p-4 bg-white shadow-sm rounded-4">
              <div class="info-item d-flex aos-init aos-animate" data-aos="fade-up" data-aos-delay="200">
                <i class="bi bi-geo-alt flex-shrink-0"></i>
                <div>
                  <h3>Address</h3>
                  <p>61-67 Street Betong, A5 Sangkat, Phnom Penh 12304</p>
                </div>
              </div><!-- End Info Item -->

              <div class="info-item d-flex aos-init aos-animate" data-aos="fade-up" data-aos-delay="300">
                <i class="bi bi-telephone flex-shrink-0"></i>
                <div>
                  <h3>Call Me</h3>
                  <p>+855 934-377-39</p>
                </div>
              </div><!-- End Info Item -->

              <div class="info-item d-flex aos-init aos-animate" data-aos="fade-up" data-aos-delay="400">
                <i class="bi bi-envelope flex-shrink-0"></i>
                <div>
                  <h3>Email Me</h3>
                  <p>snichnang@gmail.com</p>
                </div>
              </div><!-- End Info Item -->
            </div>
          </div>

          <!-- Form Column -->
          <div class="col-lg-7">
            <form action="" method="post" role="form" class="php-email-form p-4 bg-white shadow-sm rounded-4 h-100">
              <div class="row gy-4">

                <div class="col-md-6">
                  <label for="name-field" class="pb-2">Your Name</label>
                  <input type="text" name="name" id="name-field" class="form-control" required="">
                </div>

                <div class="col-md-6">
                  <label for="email-field" class="pb-2">Your Email</label>
                  <input type="email" class="form-control" name="email" id="email-field" required="">
                </div>

                <div class="col-md-12">
                  <label for="subject-field" class="pb-2">Subject</label>
                  <input type="text" class="form-control" name="subject" id="subject-field" required="">
                </div>

                <div class="col-md-12">
                  <label for="message-field" class="pb-2">Message</label>
                  <textarea class="form-control" name="message" rows="10" id="message-field" required=""></textarea>
                </div>

                <div class="col-md-12 text-center">
                  <div class="loading">Loading</div>
                  <div class="error-message"></div>
                  <div class="sent-message">Your message has been sent. Thank you!</div>

                  <button type="submit">Send Message</button>
                </div>

              </div>
            </form>
          </div>
        </div>

      </div>
    </section>

    <!-- Placeholder for footer component -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript to load components -->
    <script>
      // Load Navbar
      fetch('components/nav.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.statusText);
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('navbar-placeholder').innerHTML = data;
          
          // Adjust navbar links for subpage directory depth
          document.querySelectorAll('#navbar-placeholder .navbar-brand, #navbar-placeholder .nav-link, #navbar-placeholder .btn-contact').forEach(link => {
            let href = link.getAttribute('href');
            if (href) {
              if (href.startsWith('#')) {
                // Point to index.html with section ID (e.g. ../index.html#about)
                link.setAttribute('href', '../index.html' + href);
              } else if (href.startsWith('pages/')) {
                // Strip 'pages/' prefix since contact.html is already inside 'pages/'
                link.setAttribute('href', href.replace('pages/', ''));
              } else if (href === 'index.html') {
                // Point home logo to the root index.html
                link.setAttribute('href', '../index.html');
              }
            }
          });
        })
        .catch(error => {
          console.error('Error loading the navbar:', error);
          document.getElementById('navbar-placeholder').innerHTML = `
            <div class="alert alert-danger m-3" role="alert">
              Failed to load navbar component: ${error.message}
            </div>
          `;
        });

      // Load Footer
      fetch('components/footer.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok: ' + response.statusText);
          }
          return response.text();
        })
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data;
        })
        .catch(error => {
          console.error('Error loading the footer:', error);
          document.getElementById('footer-placeholder').innerHTML = `
            <div class="alert alert-danger m-3" role="alert">
              Failed to load footer component: ${error.message}
            </div>
          `;
        });
    </script>
</body>
</html>
