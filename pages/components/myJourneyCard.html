<div class="container" id="journey-timeline-container">
  <h2 class="fw-bold display-6 text-center mt-5 mb-5">My Journey</h2>
  <!-- Dynamic timeline rows will load here -->
</div>

<script>
  (function() {
    const isSubpage = window.location.pathname.includes('/pages/') || window.location.pathname.includes('\\pages\\');
    const jsonUrl = isSubpage ? 'components/myJourney.json' : 'pages/components/myJourney.json';

    fetch(jsonUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error('Failed to fetch journey JSON');
        }
        return response.json();
      })
      .then(data => {
        const container = document.getElementById('journey-timeline-container');
        if (!container) return;

        let htmlContent = `<h2 class="fw-bold display-6 text-center mt-5 mb-5">My Journey</h2>`;

        data.forEach((item, index) => {
          const isEven = index % 2 === 0; // Even indices are Item 1, 3 (Date Left, Card Right)

          // Adjust badge URLs for subpages
          const badgesHtml = item.badges.map(badge => {
            let badgeUrl = badge.url || '';
            if (isSubpage && badgeUrl.startsWith('pages/')) {
              badgeUrl = badgeUrl.replace('pages/', '');
            }
            return `<a href="${badgeUrl}" class="sec-journey-badge">${badge.text}</a>`;
          }).join('');

          // Create achievements list
          const achievementsHtml = item.achievements.map(ach => {
            return `<li class="mb-1">${ach}</li>`;
          }).join('');

          let rowHtml = '';
          if (isEven) {
            // Place Left, Card Right on desktop
            rowHtml = `
              <div class="row align-items-center mb-5 sec-journey-timeline-row">
                <!-- Place / Subtitle -->
                <div class="col-lg-5 text-lg-end order-2 order-lg-1 sec-journey-timeline-date">
                  <h5 class="fw-bold mb-1" style="color: #0f172a;">${item.place}</h5>
                  <p class="text-muted mb-0">${item.subtitle}</p>
                </div>

                <!-- Timeline -->
                <div class="col-lg-2 order-1 order-lg-2 sec-journey-timeline-col">
                  <div class="sec-journey-timeline-center text-center">
                    <div class="sec-journey-timeline-dot mx-auto"></div>
                    <div class="sec-journey-timeline-line mx-auto"></div>
                  </div>
                </div>

                <!-- Card -->
                <div class="col-lg-5 order-3 sec-journey-timeline-card">
                  <div class="card shadow-sm border border-light-subtle rounded-4 overflow-hidden">
                    <div class="card-body p-4">
                      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                        <div>
                          <h4 class="fw-bold mb-1" style="color: #0f172a;">${item.title}</h4>
                        </div>
                        <span class="badge rounded-pill bg-light text-primary border border-primary-subtle px-3 py-2 fw-semibold">${item.duration}</span>
                      </div>
                      
                      <p class="card-text text-secondary mb-4">${item.description}</p>
                      
                      <h6 class="fw-bold text-dark mb-2">Key Achievements:</h6>
                      <ul class="text-secondary ps-3 mb-4">
                        ${achievementsHtml}
                      </ul>

                      <div class="pt-3 border-top d-flex flex-wrap gap-2">
                        ${badgesHtml}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            `;
          } else {
            // Card Left, Place Right on desktop
            rowHtml = `
              <div class="row align-items-center mb-5 sec-journey-timeline-row">
                <!-- Card -->
                <div class="col-lg-5 order-3 order-lg-1 sec-journey-timeline-card">
                  <div class="card shadow-sm border border-light-subtle rounded-4 overflow-hidden">
                    <div class="card-body p-4">
                      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
                        <div>
                          <h4 class="fw-bold mb-1" style="color: #0f172a;">${item.title}</h4>
                        </div>
                        <span class="badge rounded-pill bg-light text-primary border border-primary-subtle px-3 py-2 fw-semibold">${item.duration}</span>
                      </div>
                      
                      <p class="card-text text-secondary mb-4">${item.description}</p>
                      
                      <h6 class="fw-bold text-dark mb-2">Key Achievements:</h6>
                      <ul class="text-secondary ps-3 mb-4">
                        ${achievementsHtml}
                      </ul>

                      <div class="pt-3 border-top d-flex flex-wrap gap-2">
                        ${badgesHtml}
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Timeline -->
                <div class="col-lg-2 order-1 order-lg-2 sec-journey-timeline-col">
                  <div class="sec-journey-timeline-center text-center">
                    <div class="sec-journey-timeline-dot mx-auto"></div>
                    <div class="sec-journey-timeline-line mx-auto"></div>
                  </div>
                </div>

                <!-- Place / Subtitle -->
                <div class="col-lg-5 order-2 order-lg-3 sec-journey-timeline-date">
                  <h5 class="fw-bold mb-1" style="color: #0f172a;">${item.place}</h5>
                  <p class="text-muted mb-0">${item.subtitle}</p>
                </div>
              </div>
            `;
          }
          htmlContent += rowHtml;
        });

        container.innerHTML = htmlContent;
      })
      .catch(error => {
        console.error('Error loading journey timeline:', error);
      });
  })();
</script>
