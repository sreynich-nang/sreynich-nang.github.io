<h2 class="fw-bold display-6 text-center mt-5">My Projects</h2>
<p class="sec-about-intro text-center mx-auto mt-4">
  I’m Nic, a Data Enthusiast. I’m interested not only in data, but also in
  how technology can be used with data, especially in system development,
  automation, and gaining insights.
</p>
<!-- <p class="sec-about-intro text-center mx-auto mt-3 mb-5">
  Two things that I will share here are my random thoughts and the
  projects that have shaped how I work today.
</p> -->

<div class="container">
  <div class="swiper mySwiper">
    <div class="swiper-wrapper" id="projects-wrapper">
      <!-- Dynamic slides will load here -->
    </div>
    <div class="swiper-pagination position-relative mt-4"></div>
  </div>
</div>

<script>
  (function() {
    const isSubpage = window.location.pathname.includes('/pages/') || window.location.pathname.includes('\\pages\\');
    const jsonUrl = isSubpage ? 'components/titleProject.json' : 'pages/components/titleProject.json';

    fetch(jsonUrl + '?t=' + new Date().getTime())
      .then(response => {
        if (!response.ok) {
          throw new Error('Failed to fetch projects JSON');
        }
        return response.json();
      })
      .then(data => {
        const wrapper = document.getElementById('projects-wrapper');
        if (!wrapper) return;

        wrapper.innerHTML = data.map(project => {
          let imageUrl = project.imageUrl;
          let exploreUrl = project.exploreUrl;

          // Adjust relative URLs if on subpages
          if (isSubpage) {
            if (imageUrl.startsWith('assets/')) {
              imageUrl = '../' + imageUrl;
            }
            if (exploreUrl.startsWith('pages/')) {
              exploreUrl = exploreUrl.replace('pages/', '');
            }
          }

          return `
            <div class="swiper-slide h-auto">
              <div class="card h-100 shadow-sm border border-light-subtle rounded-3 overflow-hidden d-flex flex-column">
                <img src="${imageUrl}" class="card-img-top object-fit-cover" style="height: 200px;" alt="${project.title}">
                <div class="card-body d-flex flex-column justify-content-between p-4">
                  <div>
                    <h5 class="card-title fw-bold mb-3">${project.title}</h5>
                    <p class="card-text text-secondary mb-4">${project.description}</p>
                  </div>
                  <div class="pt-2">
                    <a href="${exploreUrl}" class="btn btn-primary-soft w-100">Explore More</a>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Initialize Swiper after content is inserted
        new Swiper(".mySwiper", {
          slidesPerView: 1,
          spaceBetween: 25,
          loop: true,
          speed: 2000,
          autoplay: {
            delay: 2500,
            disableOnInteraction: false,
          },
          pagination: {
            el: "#projects .swiper-pagination",
            clickable: true,
          },
          breakpoints: {
            768: {
              slidesPerView: 2,
            },
            992: {
              slidesPerView: 3,
            },
          },
        });
      })
      .catch(error => {
        console.error('Error loading projects component:', error);
      });
  })();
</script>
