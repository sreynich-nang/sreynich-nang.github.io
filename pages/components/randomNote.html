<style>
  /* Post Cards Style */
  .card-blog {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background: #ffffff;
  }
  .card-blog:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08) !important;
  }
  .card-img-horizontal {
    height: 100%;
    min-height: 200px;
    background-size: cover;
    background-position: center;
    display: block;
    width: 100%;
  }
  @media (min-width: 768px) {
    .card-img-horizontal {
      min-height: 250px;
    }
  }
  .ube-post-content {
    padding: 1.25rem;
  }
  .ube-entry-meta {
    font-size: 0.8rem;
    margin-bottom: 0.75rem;
    padding-left: 0;
  }
  .category-badge {
    background: #eff6ff;
    color: #3b82f6;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.75rem;
    display: inline-block;
  }
  .ube-entry-title {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.75rem;
    color: #0f172a;
  }
  .ube-post-excerpt {
    font-size: 0.9rem;
    color: #475569;
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }
  .ube-post-excerpt p {
    margin: 0;
  }


  /* Filter Dropdown Styling */
  .btn-filter-dropdown {
    background: #ffffff;
    color: #475569;
    border: 1px solid #e2e8f0;
    padding: 12px 18px;
    border-radius: 12px;
    font-weight: 500;
    font-size: 0.95rem;
    transition: all 0.3s ease;
  }
  .btn-filter-dropdown:hover, .btn-filter-dropdown:focus {
    background: #f8fafc;
    color: #0f172a;
    border-color: #cbd5e1;
  }
  
  .dropdown-menu {
    border: 1px solid #f1f5f9;
    padding: 8px;
    box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08) !important;
  }
  
  .dropdown-item {
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 500;
    color: #475569;
    transition: all 0.2s ease;
    background: transparent;
    border: 0;
    width: 100%;
    text-align: left;
    display: block;
  }
  .dropdown-item:hover {
    background: #f1f5f9;
    color: #0f172a;
  }
  .dropdown-item.active {
    background: #eff6ff;
    color: #2563eb;
    font-weight: 600;
  }

  .note-card-item {
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .read-more-button-wrapper {
    margin-top: 15px;
  }

  @media (min-width: 992px) {
    .sticky-filter-card {
      position: sticky !important;
      top: 100px;
      z-index: 10;
    }
  }
</style>
<div class="row g-4">
  <!-- Left Side: Filter Sidebar (1/3 width on desktop) -->
  <div class="col-lg-4 mb-4 mb-lg-0">
    <div class="card border-0 shadow-sm rounded-4 p-4 sticky-filter-card">
      <h5 class="fw-bold mb-3">Filter Notes</h5>
      <div class="dropdown">
        <button class="btn btn-filter-dropdown dropdown-toggle w-100 text-start d-flex align-items-center justify-content-between" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
          <span id="current-filter-text">Show All</span>
        </button>
        <ul class="dropdown-menu w-100 border-0 rounded-3 mt-2" aria-labelledby="dropdownMenuButton" id="notes-filter-list">
          <li>
            <button class="dropdown-item active" data-filter="all">Show All</button>
          </li>
          <li>
            <button class="dropdown-item" data-filter="learn-life">Learn Life</button>
          </li>
          <li>
            <button class="dropdown-item" data-filter="learn-nature">Learn Nature</button>
          </li>
          <li>
            <button class="dropdown-item" data-filter="learn-tech">Learn Tech</button>
          </li>
          <li>
            <button class="dropdown-item" data-filter="learn-data">Learn Data</button>
          </li>
          <li>
            <button class="dropdown-item" data-filter="random-thought">Random Thought</button>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Right Side: Note Cards Grid (2/3 width on desktop) -->
  <div class="col-lg-8">
    <div class="row g-4 justify-content-center" id="random-notes-grid">
      <!-- Dynamic cards will be loaded here -->
    </div>
  </div>
</div>

<script>
  (function() {
    const isSubpage = window.location.pathname.includes('/pages/') || window.location.pathname.includes('\\pages\\');
    const jsonUrl = isSubpage ? 'components/title_randomNote.json' : 'pages/components/title_randomNote.json';

    fetch(jsonUrl + '?t=' + new Date().getTime())
      .then(response => {
        if (!response.ok) {
          throw new Error('Failed to fetch random notes JSON');
        }
        return response.json();
      })
      .then(data => {
        const gridContainer = document.getElementById('random-notes-grid');
        if (!gridContainer) return;

        // Check if there is a limit attribute on the parent placeholder
        const placeholder = document.getElementById('random-notes-placeholder');
        const limit = placeholder ? parseInt(placeholder.getAttribute('data-limit')) : null;

        let notesToShow = data;
        if (limit && !isNaN(limit)) {
          notesToShow = data.slice(0, limit);
        }

        // Render cards
        gridContainer.innerHTML = notesToShow.map((note, index) => {
          let readMoreLink = note.readMoreUrl || '';
          if (isSubpage && readMoreLink && readMoreLink.startsWith('pages/')) {
            readMoreLink = readMoreLink.replace('pages/', '');
          }

          const isEven = index % 2 === 0;
          const imgOrder = isEven ? 'order-md-1' : 'order-md-2';
          const textOrder = isEven ? 'order-md-2' : 'order-md-1';
          const imgCol = note.imageCol || 'col-md-4';
          const textCol = note.textCol || 'col-md-8';

          return `
            <div class="col-12 note-card-item mb-3" data-tag="${note.tag}">
              <div class="card card-blog border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="row g-0 align-items-stretch">
                  <div class="${imgCol} ${imgOrder}">
                    <div class="card-img-horizontal" style="background-image: url('${note.imageUrl}'); ${note.imageStyle || ''}"></div>
                  </div>
                  <div class="${textCol} ${textOrder} d-flex align-items-center">
                    <div class="card-body p-4">
                      <div class="ube-post-content p-0">
                        <ul class="ube-entry-meta list-inline mb-2">
                          <li class="list-inline-item">
                            <span class="category-badge">${note.category}</span>
                          </li>
                        </ul>
                        <header class="ube-entry-header">
                          <h2 class="ube-entry-title mb-2">
                            ${note.title}
                          </h2>
                        </header>
                        <div class="ube-entry-content">
                          <div class="ube-post-excerpt">
                            <p class="mb-0">${note.excerpt}</p>
                          </div>
                          ${note.readMoreUrl ? `
                          <div class="read-more-button-wrapper">
                            <a href="${readMoreLink}" class="ube-post-read-more-btn btn btn-sm btn-rounded btn-outline-primary btn-outline">
                              Read More
                            </a>
                          </div>
                          ` : ''}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Attach event listeners for filtering
        const filtersContainer = document.getElementById('notes-filter-list');
        if (filtersContainer) {
          const filterButtons = filtersContainer.querySelectorAll('.dropdown-item');
          const cardItems = gridContainer.querySelectorAll('.note-card-item');

          filterButtons.forEach(button => {
            button.addEventListener('click', () => {
              // Active state toggling
              filterButtons.forEach(btn => btn.classList.remove('active'));
              button.classList.add('active');

              // Update the dropdown trigger text
              const triggerText = document.getElementById('current-filter-text');
              if (triggerText) {
                triggerText.textContent = button.textContent.trim();
              }

              const filterValue = button.getAttribute('data-filter');

              cardItems.forEach(item => {
                const itemTag = item.getAttribute('data-tag');
                if (filterValue === 'all' || itemTag === filterValue) {
                  item.style.display = 'block';
                  setTimeout(() => {
                    item.style.opacity = '1';
                    item.style.transform = 'scale(1)';
                  }, 50);
                } else {
                  item.style.opacity = '0';
                  item.style.transform = 'scale(0.95)';
                  setTimeout(() => {
                    item.style.display = 'none';
                  }, 300);
                }
              });
            });
          });
        }
      })
      .catch(error => {
        console.error('Error loading random notes content:', error);
        const gridContainer = document.getElementById('random-notes-grid');
        if (gridContainer) {
          gridContainer.innerHTML = `
            <div class="col-12 alert alert-danger" role="alert">
              Failed to load notes content: ${error.message}
            </div>
          `;
        }
      });
  })();
</script>
